name: Build CHORwerk

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
          - name: macOS
            os: macos-14
          - name: Windows
            os: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
            ladspa-sdk-dev libcurl4-openssl-dev libfreetype6-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev \
            libxrandr-dev libwebkit2gtk-4.0-dev build-essential mesa-common-dev \
            libglu1-mesa-dev freeglut3-dev libgtk-3-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Stage Artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          find build -name "*.vst3" -exec cp -r {} dist/ \;
          find build -name "*.clap" -exec cp -r {} dist/ \;
          find build -name "*.component" -exec cp -r {} dist/ \;
          find build -path "*/Standalone/*" -type f -not -name "*.*" -exec cp {} dist/ \; || true

      - name: Stage Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Get-ChildItem -Path build -Include "*.vst3","*.clap","*.exe" -Recurse | ForEach-Object {
              $dest = Join-Path "dist" $_.Name
              if (Test-Path $dest) { Remove-Item -Path $dest -Recurse -Force }
              Copy-Item -Path $_.FullName -Destination $dest -Recurse -Force
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CHORwerk-${{ matrix.name }}
          path: dist/

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip Artifacts (Linux)
        run: zip -r CHORwerk-Linux.zip artifacts/CHORwerk-Linux/*
      
      - name: Zip Artifacts (macOS)
        run: zip -r CHORwerk-macOS.zip artifacts/CHORwerk-macOS/*

      - name: Zip Artifacts (Windows)
        run: zip -r CHORwerk-Windows.zip artifacts/CHORwerk-Windows/*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CHORwerk-Linux.zip
            CHORwerk-macOS.zip
            CHORwerk-Windows.zip
          body_path: README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
