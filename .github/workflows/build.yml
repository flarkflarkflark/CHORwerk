name: Build CHORwerk

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            artifact-path: build/CHORwerk v1-0-0_artefacts/Release
          - name: macOS
            os: macos-latest
            artifact-path: build/CHORwerk v1-0-0_artefacts/Release
          - name: Windows
            os: windows-latest
            artifact-path: build/CHORwerk v1-0-0_artefacts/Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
            ladspa-sdk-dev libcurl4-openssl-dev libfreetype6-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev \
            libxrandr-dev libwebkit2gtk-4.0-dev build-essential mesa-common-dev \
            libglu1-mesa-dev freeglut3-dev libgtk-3-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Upload Artifacts (Linux)
        if: matrix.name == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: CHORwerk-Linux
          path: |
            build/CHORwerk v1-0-0_artefacts/Release/VST3/*.vst3
            build/CHORwerk v1-0-0_artefacts/Release/CLAP/*.clap
            build/CHORwerk v1-0-0_artefacts/Release/Standalone/*

      - name: Upload Artifacts (macOS)
        if: matrix.name == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: CHORwerk-macOS
          path: |
            build/CHORwerk v1-0-0_artefacts/Release/VST3/*.vst3
            build/CHORwerk v1-0-0_artefacts/Release/CLAP/*.clap
            build/CHORwerk v1-0-0_artefacts/Release/AU/*.component
            build/CHORwerk v1-0-0_artefacts/Release/Standalone/*

      - name: Upload Artifacts (Windows)
        if: matrix.name == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: CHORwerk-Windows
          path: |
            build/CHORwerk v1-0-0_artefacts/Release/VST3/*.vst3
            build/CHORwerk v1-0-0_artefacts/Release/CLAP/*.clap
            build/CHORwerk v1-0-0_artefacts/Release/Standalone/*.exe
