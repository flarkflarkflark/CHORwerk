name: Build CHORwerk

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            artifact-path: build/CHORwerk v1-0-0_artefacts/Release
          - name: macOS
            os: macos-13
            artifact-path: build/CHORwerk v1-0-0_artefacts/Release
          - name: Windows
            os: windows-2022
            artifact-path: build/CHORwerk v1-0-0_artefacts/Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev 
            ladspa-sdk-dev libcurl4-openssl-dev libfreetype6-dev 
            libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev 
            libxrandr-dev libwebkit2gtk-4.0-dev build-essential mesa-common-dev 
            libglu1-mesa-dev freeglut3-dev libgtk-3-dev

      - name: Set up CMake
        uses: jason-curtis/setup-cmake@main

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Upload Artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v3
        with:
          name: CHORwerk-${{ matrix.name }}
          path: |
            ${{ matrix.artifact-path }}/VST3/*.vst3
            ${{ matrix.artifact-path }}/CLAP/*.clap
            ${{ matrix.artifact-path }}/AU/*.component
            ${{ matrix.artifact-path }}/Standalone/*

      - name: Upload Artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v3
        with:
          name: CHORwerk-Windows
          path: |
            build/CHORwerk v1-0-0_artefacts/Release/VST3/*.vst3
            build/CHORwerk v1-0-0_artefacts/Release/CLAP/*.clap
            build/CHORwerk v1-0-0_artefacts/Release/Standalone/*.exe
